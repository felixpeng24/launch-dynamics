# Reusable Launch Vehicle Landing Dynamics — Default Configuration
# Vehicle parameters approximate Starship from publicly available data

vehicle:
  name: "Starship-Approximate"
  dry_mass: 100000.0          # kg
  landing_propellant: 5000.0  # kg
  height: 50.0                # m (total vehicle height)
  diameter: 9.0               # m
  cg_height: 25.0             # m above base (approximate for near-empty tank)

  # Moment of inertia (pitch) - approximated as uniform cylinder
  # I = (1/12) * m * (3*r^2 + h^2) for a solid cylinder
  # Adjusted for hollow structure
  inertia_pitch: 20000000.0   # kg*m^2

  # Landing legs — 6 legs evenly spaced, projected to 2D plane
  # Each leg defined by (x_offset, z_offset) relative to CG in body frame
  # For planar model: effective legs from 3D projection
  legs:
    - name: "left_outer"
      x_offset: -3.9       # m (R * sin(60deg), R = 4.5m)
      z_offset: -25.0      # m below CG
    - name: "left_inner"
      x_offset: -2.25      # m (R * sin(30deg))
      z_offset: -25.0
    - name: "center_left"
      x_offset: -0.5       # m (slight offset for stability)
      z_offset: -25.0
    - name: "center_right"
      x_offset: 0.5
      z_offset: -25.0
    - name: "right_inner"
      x_offset: 2.25
      z_offset: -25.0
    - name: "right_outer"
      x_offset: 3.9
      z_offset: -25.0

thrust:
  mode: "simple"  # "simple" or "multi_engine"

  simple:
    max_thrust: 2200000.0     # N (single Raptor for final approach, ~2.2 MN)
    min_throttle: 0.2         # effective min throttle for guidance
    profile_type: "linear"    # "linear" or "polynomial"
    burn_start_altitude: 150.0  # m AGL — final approach phase start
    target_velocity: -2.0     # m/s at touchdown (target)

  multi_engine:
    n_engines: 3
    thrust_per_engine: 2200000.0  # N
    min_throttle: 0.4
    burn_start_altitude: 500.0
    # Engine positions relative to vehicle centerline (body x-axis)
    engine_positions:
      - x_offset: -1.5   # m
      - x_offset: 0.0
      - x_offset: 1.5
    # Sequential shutdown altitudes (last engine stays on)
    shutdown_sequence:
      - engine_idx: 0
        shutdown_altitude: 50.0  # m
      - engine_idx: 2
        shutdown_altitude: 50.0

contact:
  stiffness: 50000000.0     # N/m^n (per-leg stiffness) = 5e7
  damping: 300000.0         # N*s/m (per-leg damping) = 3e5, gives ~3g at 2m/s TD
  nonlinearity: 1.5          # exponent n in F = k * delta^n
  friction_coeff: 0.5        # Coulomb friction coefficient

aerodynamics:
  enabled: false
  drag_coeff: 1.2            # Cd (blunt body approximation)
  reference_area: 63.6       # m^2 (pi * 4.5^2)
  air_density: 1.225         # kg/m^3

simulation:
  t_start: 0.0
  t_max: 60.0                # s (maximum sim time)
  dt_max: 0.001              # s (max integration step during contact)
  method: "LSODA"            # ODE solver (LSODA handles stiffness well)
  rtol: 0.00000001
  atol: 0.0000000001
  settle_time: 1.0           # s after first contact to check for settled
  settle_velocity: 0.1       # m/s threshold for "settled"

initial_conditions:
  altitude: 150.0            # m AGL (final approach, post 3-engine braking)
  vertical_velocity: -25.0   # m/s (descending, after initial deceleration)
  lateral_position: 0.0      # m
  lateral_velocity: 0.0      # m/s
  pitch_angle: 0.0           # rad
  pitch_rate: 0.0            # rad/s

monte_carlo:
  n_cases: 5000
  seed: 42
  dispersions:
    vertical_velocity:
      nominal: -25.0          # m/s (matches IC, perturbed around burn start)
      sigma: 3.0              # 3-sigma = 9 m/s
    lateral_velocity:
      nominal: 0.0
      sigma: 0.5              # 3-sigma = 1.5 m/s
    pitch_angle:
      nominal: 0.0
      sigma: 0.006            # 3-sigma = 0.018 rad (~1 deg)
    pitch_rate:
      nominal: 0.0
      sigma: 0.003            # 3-sigma = 0.009 rad/s (~0.5 deg/s)
    thrust_scale:
      nominal: 1.0
      sigma: 0.0167           # 3-sigma = 5%
    mass_scale:
      nominal: 1.0
      sigma: 0.01             # 3-sigma = 3%
    cg_offset:
      nominal: 0.0
      sigma: 0.0333           # 3-sigma = 0.1 m
    wind_force:
      nominal: 0.0
      sigma: 3333.3           # 3-sigma = 10 kN
    leg_stiffness_scale:
      nominal: 1.0
      sigma: 0.0333           # 3-sigma = 10%

gravity: 9.80665  # m/s^2
